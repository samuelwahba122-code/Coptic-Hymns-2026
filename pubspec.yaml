name: hymn_app
description: Hymn app

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  just_audio: ^0.9.36
  audio_session: ^0.1.18
  pdfx: ^2.9.2

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/hymns/
    - assets/pdfs/
    - assets/lines/
    - assets/lines/keryeleyson/
    - assets/lines/enthote_ti/
    - assets/lines/shari_efnoti/

    - assets/images/
    - assets/icon/


dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21